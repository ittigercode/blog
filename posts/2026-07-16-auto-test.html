<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>测试自动发布 - Yang's Blog</title>
<style>
:root { --bg: #0d1117; --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff; --border: #30363d; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height:1.8; padding: 40px 20px; }
article { max-width: 720px; margin: 0 auto; }
h1 { font-size: 2em; margin-bottom: 8px; }
h2 { margin: 24px 0 12px; }
p { margin-bottom: 12px; }
time { color: var(--muted); font-size: 0.9em; }
blockquote { border-left: 3px solid var(--accent); padding: 8px 16px; margin: 16px 0; background: rgba(88,166,255,0.05); border-radius: 0 6px 6px 0; color: var(--muted); }
a { color: var(--accent); }
ol { margin: 12px 0 12px 24px; }
li { margin-bottom: 6px; }
.back { display: inline-block; margin-bottom: 24px; color: var(--muted); text-decoration: none; font-size: 0.9em; }
.back:hover { color: var(--accent); }
</style>
</head>
<body>
<article>
<a class="back" href="/">← 返回首页</a>
<h1>测试自动发布</h1>
<time>2026-07-16</time>
<blockquote>这篇文章由 AI 自动编写并发布，全程无需人工操作。自动生成、自动更新首页、自动推送 GitHub，一气呵成。</blockquote>
<h2>工作流程</h2>
<ol>
  <li>用户说「发布文章 + 标题 + 内容」</li>
  <li>AI 生成文章</li>
  <li>自动更新首页</li>
  <li>自动推送到 GitHub</li>
</ol>
<p>一切都自动完成！🚀</p>
</article>
</body>
</html>
