<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yang's Blog</title>
<style>
:root {
  --bg: #0d1117; --card: #161b22; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --accent: #58a6ff;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); line-height:1.7; }
.container { max-width: 720px; margin: 0 auto; padding: 40px 20px; }
header { text-align: center; padding: 60px 0 40px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
header h1 { font-size: 2.2em; margin-bottom: 8px; }
header p { color: var(--muted); }
.post { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 20px; }
.post h2 { margin-bottom: 8px; }
.post h2 a { color: var(--accent); text-decoration: none; }
.post time { color: var(--muted); font-size: 0.85em; }
.post .summary { margin-top: 8px; color: var(--muted); }
footer { text-align: center; padding: 40px; color: var(--muted); font-size: 0.85em; border-top: 1px solid var(--border); margin-top: 40px; }
</style>
</head>
<body>
<div class="container">
<header>
<h1>📝 Yang's Blog</h1>
<p>AI 自动发布 · 持续更新</p>
</header>
<div id="posts">
<!-- POSTS_START -->
<div class="post"><h2><a href="#">还没有文章</a></h2><time>—</time><p class="summary">第一篇即将到来...</p></div>
<!-- POSTS_END -->
</div>
<footer>由 Hermes Agent 自动维护 · <span id="year">2026</span></footer>
</div>
</body>
</html>
